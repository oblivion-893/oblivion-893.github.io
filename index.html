<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Segoe UI', sans-serif;
}

body {
    background: #0f172a;
    color: white;
    text-align: center;
}

#loginScreen {
    position: fixed;
    width: 100%;
    height: 100vh;
    background: #020617;
    display: flex;
    justify-content: center;
    align-items: center;
    flex-direction: column;
    z-index: 999;
}

.login-box {
    background: #1e293b;
    padding: 40px;
    border-radius: 15px;
    box-shadow: 0 0 40px rgba(0,0,0,0.6);
}

.login-box h2 {
    margin-bottom: 20px;
}

.login-box input {
    padding: 10px;
    border: none;
    border-radius: 8px;
    width: 200px;
    margin-bottom: 15px;
    text-align: center;
}

.login-box button {
    padding: 10px 20px;
    border: none;
    border-radius: 8px;
    background: #38bdf8;
    color: black;
    cursor: pointer;
    font-weight: bold;
}

.login-box button:hover {
    background: #0ea5e9;
}

#error {
    color: red;
    margin-top: 10px;
}

#mainSite {
    display: none;
}

.hero {
    padding: 60px 20px 30px;
}

.welcome {
    font-size: 2rem;
    opacity: 0.8;
}

.rainbow {
    font-size: 4rem;
    font-weight: bold;
    background: linear-gradient(90deg, red, orange, yellow, green, cyan, blue, violet);
    background-size: 400%;
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    animation: rainbowMove 8s linear infinite;
}

@keyframes rainbowMove {
    0% { background-position: 0% }
    100% { background-position: 400% }
}

.subtitle {
    margin-top: 10px;
    color: #94a3b8;
}

.games-container {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
    gap: 20px;
    padding: 40px;
}

.game-card {
    background: #1e293b;
    border-radius: 15px;
    padding: 20px;
    cursor: pointer;
    transition: 0.3s;
    box-shadow: 0 5px 15px rgba(0,0,0,0.3);
}

.game-card:hover {
    transform: translateY(-10px) scale(1.05);
    background: #334155;
}

.game-card img {
    width: 100%;
    height: 120px;
    object-fit: contain;
    margin-bottom: 10px;
}

footer {
    margin: 40px 0;
}
</style>

</head>

<body>

<div id="loginScreen">
    <div class="login-box">
        <h2>password nice</h2>
        <input type="password" id="passwordInput" placeholder="password">
        <br>
        <button onclick="checkPassword()">enter</button>
        <p id="error"></p>
    </div>
</div>

<script>
function checkPassword() {
    const password = document.getElementById("passwordInput").value;

    if (password === "1234") { // CHANGE PASSWORD HERE

}
