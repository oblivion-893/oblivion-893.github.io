<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Segoe UI', sans-serif;
}

body {
    background: linear-gradient(135deg, #020617, #0f172a);
    color: white;
    text-align: center;
    min-height: 100vh;
}

/* TOP NAV */
.top-nav {
    position: sticky;
    top: 0;
    z-index: 50;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 16px;
    padding: 14px 22px;
    background: rgba(2, 6, 23, 0.7);
    backdrop-filter: blur(14px);
    border-bottom: 1px solid rgba(255,255,255,0.08);
}

.nav-title {
    font-weight: 800;
    letter-spacing: 0.2px;
    text-decoration: none;
    color: white;
    opacity: 0.92;
    font-size: 1.05rem;
}

.nav-tabs {
    display: flex;
    align-items: center;
    gap: 10px;
}

.nav-tab {
    padding: 9px 14px;
    border-radius: 12px;
    text-decoration: none;
    color: rgba(255,255,255,0.86);
    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(255,255,255,0.08);
    transition: 0.2s ease;
    font-weight: 600;
}

.nav-tab:hover {
    transform: translateY(-1px);
    background: rgba(255,255,255,0.09);
    border-color: rgba(56,189,248,0.35);
}

.nav-tab.active {
    color: #001018;
    background: linear-gradient(135deg, #38bdf8, #0ea5e9);
    border-color: rgba(56,189,248,0.0);
    box-shadow: 0 10px 24px rgba(56,189,248,0.18);
}

/* PAGES */
.page {
    display: none;
}

.page.active {
    display: block;
}

/* LOGIN SCREEN */
#loginScreen {
    position: fixed;
    width: 100%;
    height: 100vh;
    background: rgba(2, 6, 23, 0.9);
    backdrop-filter: blur(10px);
    display: flex;
    justify-content: center;
    align-items: center;
    z-index: 999;
}

.login-box {
    background: rgba(30, 41, 59, 0.6);
    backdrop-filter: blur(20px);
    padding: 50px;
    border-radius: 20px;
    box-shadow: 0 0 60px rgba(0,0,0,0.6);
    border: 1px solid rgba(255,255,255,0.1);
}

.login-box h2 {
    margin-bottom: 20px;
    opacity: 0.8;
}

.login-box input {
    padding: 12px;
    border: none;
    border-radius: 10px;
    width: 220px;
    margin-bottom: 15px;
    text-align: center;
    background: rgba(255,255,255,0.05);
    color: white;
    outline: none;
}

.login-box button {
    padding: 12px 25px;
    border: none;
    border-radius: 10px;
    background: linear-gradient(135deg, #38bdf8, #0ea5e9);
    color: black;
    cursor: pointer;
    font-weight: bold;
    transition: 0.3s;
}

.login-box button:hover {
    transform: scale(1.05);
    box-shadow: 0 0 20px #38bdf8;
}

#error {
    color: #f87171;
    margin-top: 10px;
}

/* MAIN SITE */
#mainSite {
    display: none;
}

.hero {
    padding: 55px 20px 30px;
}

.rainbow {
    font-size: 4rem;
    font-weight: bold;
    background: linear-gradient(90deg, red, orange, yellow, green, cyan, blue, violet);
    background-size: 400%;
    background-clip: text;
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    animation: rainbowMove 8s linear infinite;
}

@keyframes rainbowMove {
    0% { background-position: 0% }
    100% { background-position: 400% }
}

/* GAMES GRID */
.games-container {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
    gap: 25px;
    padding: 40px;
}

/* GAME CARD */
.game-card {
    background: rgba(30, 41, 59, 0.5);
    backdrop-filter: blur(15px);
    border-radius: 20px;
    padding: 20px;
    cursor: pointer;
    transition: all 0.3s ease;
    box-shadow: 0 10px 25px rgba(0,0,0,0.4);
    border: 1px solid rgba(255,255,255,0.08);
}

.game-card:hover {
    transform: translateY(-10px) scale(1.05);
    background: rgba(51, 65, 85, 0.7);
    box-shadow: 0 15px 35px rgba(56,189,248,0.2);
}

.game-card img {
    width: 100%;
    height: 120px;
    object-fit: contain;
    margin-bottom: 10px;
    filter: drop-shadow(0 5px 10px rgba(0,0,0,0.5));
}

.game-card h2 {
    font-size: 1.2rem;
    opacity: 0.9;
}

/* FOOTER */
footer {
    margin: 40px 0;
    opacity: 0.6;
}

/* ANNOUNCEMENTS (WHATSAPP-LIKE CARD) */
.announcements {
    max-width: 980px;
    margin: 0 auto;
    padding: 30px 20px 10px;
}

.announcements h2 {
    text-align: left;
    font-size: 1.1rem;
    opacity: 0.85;
    margin: 0 0 12px;
}

.wa-card {
    display: flex;
    gap: 12px;
    align-items: flex-start;
    padding: 14px 14px 12px;
    background: rgba(30, 41, 59, 0.55);
    border: 1px solid rgba(255,255,255,0.09);
    border-radius: 18px;
    backdrop-filter: blur(16px);
    box-shadow: 0 12px 28px rgba(0,0,0,0.35);
}

.wa-avatar {
    width: 44px;
    height: 44px;
    border-radius: 50%;
    object-fit: cover;
    border: 1px solid rgba(255,255,255,0.16);
    flex: 0 0 44px;
}

.wa-body {
    flex: 1;
    text-align: left;
}

.wa-name {
    font-weight: 800;
    letter-spacing: 0.2px;
    margin: 0 0 4px;
    opacity: 0.95;
}

.wa-bubble {
    display: inline-block;
    max-width: 100%;
    padding: 10px 12px;
    border-radius: 14px 14px 14px 6px;
    background: rgba(15, 23, 42, 0.6);
    border: 1px solid rgba(255,255,255,0.08);
    line-height: 1.35;
    color: rgba(255,255,255,0.9);
}

.wa-meta {
    margin-top: 6px;
    font-size: 0.82rem;
    opacity: 0.55;
}
</style>

</head>

<body>

<div id="loginScreen">
    <div class="login-box">
        <h2>access code</h2>
        <input type="password" id="passwordInput" placeholder="7-character code">
        <br>
        <button onclick="checkPassword()">enter</button>
        <p id="error"></p>

</div>

<!-- MAIN SITE -->
<div id="mainSite">

<nav class="top-nav">
    <a class="nav-title" href="./index.html">oblivion-893.github.io</a>
    <div class="nav-tabs">
        <a class="nav-tab" data-page="games" href="#games">Games</a>

<section class="page active" id="page-games" data-page="games">

    <section class="games-container">

    <div class="game-card" onclick="window.location.href='./Games/Minecraft/'">

        <h2>Minecraft</h2>
    </div>

    <div class="game-card" onclick="window.location.href='./Games/2048/'">
        <img src="https://2048.gg/assets/img/2048-game.png">

    </div>

    <div class="game-card" onclick="window.location.href='./Games/Snake/'">

        <h2>Google Snake</h2>
    </div>

    <div class="game-card" onclick="window.location.href='./Games/Tetris/Tetris.html'">
        <img src="https://play-lh.googleusercontent.com/7Zn2QBzByBf4XyQPhuRVsOkSaKSYsty1ka-6_bh6Ub-2kQri6xqqRdK52qxEM69N6cw">
        <h2>Tetris</h2>
    </div>

    <div class="game-card" onclick="window.location.href='./Games/CookieClicker/CookieClicker.html'">
        <img src="https://play-lh.googleusercontent.com/OssE3ON9WsLZedOF39UCgtIHcRYfV0OqQS9O78LfmRdxSyKdHX52G2OFa0LkG6D-k9w">
        <h2>Cookie Clicker</h2>
    </div>

    <div class="game-card" onclick="window.location.href='./Games/driftboss/'">
        <img src="https://img-cdn.heygame.io/gameimages/5d5939ef-9c49-4b01-87fc-575f88cfd79c-Drift%20Boss.webp">

    <div class="game-card" onclick="window.location.href='./Games/Territorial.io/'">

    <div class="game-card" onclick="window.location.href='./Games/Geometrydash/'">
        <img src="https://images.seeklogo.com/logo-png/61/2/geometry-dash-logo-png_seeklogo-617886.png">

</section>

<section class="page" id="page-updates" data-page="updates">
    <section class="announcements" id="announcements">

        <div class="wa-card">
            <img class="wa-avatar" src="./assets/pics/sigma.jpg" alt="Profile picture">
            <div class="wa-body">
                <div class="wa-name">kordek</div>
                <div class="wa-bubble">added navbar, removed and added some games, new ui lmk any games or tweaks you want added and ill think about them.</div>
                <div class="wa-meta">27/03/26</div>
            </div>
        </div>
    </section>
</section>

</div>

<script>
function setActivePage(page) {
    const gamesPage = document.getElementById("page-games");
    const updatesPage = document.getElementById("page-updates");

    const isUpdates = page === "updates";
    gamesPage.classList.toggle("active", !isUpdates);
    updatesPage.classList.toggle("active", isUpdates);

    document.querySelectorAll(".nav-tab").forEach((tab) => {
        tab.classList.toggle("active", tab.dataset.page === page);
    });
}

function pageFromHash() {
    const h = (window.location.hash || "").toLowerCase();
    return h === "#updates" ? "updates" : "games";
}

function checkPassword() {
    const input = document.getElementById("passwordInput").value;
    const accessCodes = [
        "Q7M4X2P",
        "N8K1V5R",
        "T3B9L6W",
        "H2D7S4Y",
        "P6J8C1N",
        "R5F2Z9K",
        "V1G7M3T",
        "X4Q8H6B",
        "L9W2P5D",
        "C3Y7R1F"
    ];
    const normalizedInput = String(input || "").trim().toUpperCase();

    if (accessCodes.includes(normalizedInput)) {
        localStorage.setItem("kneeAccessGranted", "1");
        localStorage.setItem("kneeAccessCode", normalizedInput);

        const webhookUrl = "PASTE_YOUR_WEBHOOK_URL_HERE";
        const sendWebhookNotice = async () => {
            if (!webhookUrl || webhookUrl.includes("PASTE_YOUR_WEBHOOK_URL_HERE")) return;
            let ip = "unknown";
            try {
                const ipRes = await fetch("https://api.ipify.org?format=json");
                const ipData = await ipRes.json();
                if (ipData && ipData.ip) ip = ipData.ip;
            } catch (e) {
                // Keep access working even if IP lookup fails.
            }

            try {
                await fetch(webhookUrl, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({
                        content:
                            "Access granted on homepage\n" +
                            "Code: " + normalizedInput + "\n" +
                            "IP: " + ip + "\n" +
                            "Page: " + window.location.href + "\n" +
                            "User-Agent: " + navigator.userAgent
                    })
                });
            } catch (e) {
                // Ignore webhook failures so login never breaks.
            }
        };

        sendWebhookNotice();
        document.getElementById("loginScreen").style.display = "none";
        document.getElementById("mainSite").style.display = "block";
        setActivePage(pageFromHash());
    } else {
        document.getElementById("error").innerText = "wrong access code";
    }
}

window.addEventListener("hashchange", () => {
    if (document.getElementById("mainSite").style.display === "block") {
        setActivePage(pageFromHash());
    }
});
</script>

</body>
</html>
