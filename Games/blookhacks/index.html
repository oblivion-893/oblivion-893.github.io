<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Segoe UI', sans-serif;
}

body {
    background: #0f172a;
    color: white;
    text-align: center;
}

#loginScreen {
    position: fixed;
    width: 100%;
    height: 100vh;
    background: #020617;
    display: flex;
    justify-content: center;
    align-items: center;
    flex-direction: column;
    z-index: 999;
}



.window{
  background:green;
  border: 1px solid black;
  border-radius:5px 5px 0 0;
  display:flex;
  flex-direction:column;
  border-color: #0072ef #01279e #01279e #0236d8;
  background:
    linear-gradient(to right, #034fe1, #1682f2 1px, #006ee4 2px, rgba(0,0,0,0) 3px),
    linear-gradient(to left, #0034b0, #0056e1 1px, #0064f4 2px, rgba(0,0,0,0) 3px),
    linear-gradient(to top, #0034b1, #0056e1 1px, #0064f4 2px, rgba(0,0,0,0) 3px)
    ;
  *{
    cursor: default;
  }
  h2{
    background: #006fea;
    line-height: 32px;
    height:30px;
    position:relative;
    margin:0;
    padding:0;
    border-radius:3px 3px 0 0;
    background-image:
      linear-gradient(to right, #0050db, rgba(255,255,255,.1) 4px, rgba(255,255,255,0) 200px),
      linear-gradient(to left, #0034b0, #0056e1 1px, #0064f4 2px, rgba(0,0,0,0) 3px),
      linear-gradient(to bottom, #4aa9ff, #33a4ff 1px, #008aff 2px, #007ef4 3px, #0075f0 4px, rgba(0,0,0,0) 5px),
      linear-gradient(to top, #005dd9, #0067e9 1px, #007afb 2px, #0081fb 3px, rgba(0,0,0,0) 4px);
    font-family: sans-serif;
    color:white;
    font-weight: normal;
    font-size:14px;
    padding-left:8px;
    text-shadow: 1px 1px 0 #0a2a95;
  }

    h1{
    background: #006fea;
    line-height: 32px;
    height:30px;
    position:relative;
    margin:0;
    padding:0;
    border-radius:3px 3px 0 0;
    background-image:
      linear-gradient(to right, #0050db, rgba(255,255,255,.1) 4px, rgba(255,255,255,0) 200px),
      linear-gradient(to left, #0034b0, #0056e1 1px, #0064f4 2px, rgba(0,0,0,0) 3px),
      linear-gradient(to bottom, #4aa9ff, #33a4ff 1px, #008aff 2px, #007ef4 3px, #0075f0 4px, rgba(0,0,0,0) 5px),
      linear-gradient(to top, #005dd9, #0067e9 1px, #007afb 2px, #0081fb 3px, rgba(0,0,0,0) 4px);
    font-family: sans-serif;
    color:white;
    font-weight: normal;
    font-size:14px;
    padding-left:8px;
    text-shadow: 1px 1px 0 #0a2a95;
  }

  h2{
    line-height: 32px;
    height:30px;
    position:relative;
    font-family: sans-serif;
    color:rgb(0, 0, 0);
    font-weight: normal;
    font-size:14px;
    padding-left:8px;
  }


  .content{
    flex:1;
    margin:0;
    border: 1px solid #91adc6;
    margin:0 2px 2px;
  }
  .close{
    position:absolute;
    right: 6px;
    top: 6px;
    height: 19px;
    padding-left:19px;
    width:0;
    overflow:hidden;
    border:1px solid white;
    border-radius: 3px;
    background:
      radial-gradient(circle at 20px 20px, #e84f00, rgba(255,255,255,0)),
      radial-gradient(circle at -5px -5px, white, rgba(255,255,255,.3), rgba(255,255,255,0)),
      linear-gradient(to bottom, rgba(255,255,255,0.2), rgba(255,255,255,0)),
      linear-gradient(to right, rgba(255,255,255,0.2), rgba(255,255,255,0))
      ;
    background-color: #e81000;
    &:after{
      content:"";
      display:block;
      position:absolute;
      top:0;
      right:0;
      left:0;
      bottom:0;
      border:1px solid rgba(33,0,0,0.2);
      border-radius: 2px;
    }
    &:before{
      content:"×";
      position:absolute;
      left:2.5px;
      top:-7px;
      color: white;
      text-shadow:none;
      font-size:23px;
    }
  }
    
}

.login-box {
    background: #1e293b;
    padding: 40px;
    border-radius: 15px;
    box-shadow: 0 0 40px rgba(0,0,0,0.6);
}

.login-box h2 {
    margin-bottom: 20px;
}

.login-box input {
    padding: 10px;
    border: none;
    border-radius: 8px;
    width: 200px;
    margin-bottom: 15px;
    text-align: center;
}

.login-box button {
    padding: 10px 20px;
    border: none;
    border-radius: 8px;
    background: #38bdf8;
    color: black;
    cursor: pointer;
    font-weight: bold;
}

.login-box button:hover {
    background: #0ea5e9;
}

#error {
    color: red;
    margin-top: 10px;
}

#mainSite {
    display: none;
}

.hero {
    padding: 60px 20px 30px;
}

.welcome {
    font-size: 2rem;
    opacity: 0.8;
}

.rainbow {
    font-size: 4rem;
    font-weight: bold;
    background: linear-gradient(90deg, red, orange, yellow, green, cyan, blue, violet);
    background-size: 400%;
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    animation: rainbowMove 8s linear infinite;
}

@keyframes rainbowMove {
    0% { background-position: 0% }
    100% { background-position: 400% }
}

.subtitle {
    margin-top: 10px;
    color: #94a3b8;
}

.games-container {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
    gap: 20px;
    padding: 40px;
}

.game-card {
    background: #1e293b;
    border-radius: 15px;
    padding: 20px;
    cursor: pointer;
    transition: 0.3s;
    box-shadow: 0 5px 15px rgba(0,0,0,0.3);
}

.game-card:hover {
    transform: translateY(-10px) scale(1.05);
    background: #334155;
}

.game-card img {
    width: 100%;
    height: 120px;
    object-fit: contain;
    margin-bottom: 10px;
}

footer {
    margin: 40px 0;
}
</style>

</head>

<body>

<div id="loginScreen">
    <div class="login-box">
        <h2>password nice</h2>
        <input type="password" id="passwordInput" placeholder="password">
        <br>
        <button onclick="checkPassword()">enter</button>
        <p id="error"></p>
    </div>
</div>

<!-- MAIN SITE -->
<div id="mainSite">

<header class="hero">
    <h1 class="rainbow">oblivion-893.github.io</h1>
</header>

<section class="games-container">
    <a href="./copytoconsole.txt" target="_blank">
      <button class="fancy-button">some scripts</button>
    </a>

<style>
.fancy-button {
  background: linear-gradient(45deg, #6a11cb, #2575fc);
  color: white;
  border: none;
  padding: 15px 32px;
  font-size: 16px;
  font-weight: bold;
  border-radius: 50px;
  cursor: pointer;
  box-shadow: 0 4px 14px rgba(0, 0, 0, 0.2);
  transition: all 0.3s ease;
  text-transform: uppercase;
  letter-spacing: 1px;
}

.fancy-button:hover {
  transform: translateY(-2px);
  box-shadow: 0 7px 20px rgba(0, 0, 0, 0.3);
  background: linear-gradient(45deg, #2575fc, #6a11cb);
}

.fancy-button:active {
  transform: translateY(1px);
  box-shadow: 0 2px 8px rgba(0, 0, 0, 0.2);
}
</style>   

</section>

<footer>
    <p>made by kordek</p>
</footer>

</div>

<script>
function checkPassword() {
    const password = document.getElementById("passwordInput").value;

    if (password === "secret90") { // CHANGE PASSWORD HERE
        document.getElementById("loginScreen").style.display = "none";
        document.getElementById("mainSite").style.display = "block";
    } else {
        document.getElementById("error").innerText = "wrong";
    }
}
</script>

</body>
</html>
